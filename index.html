<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Card Barcodes</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0a0a0a;
  --panel: #131313;
  --panel-hover: #191919;
  --border: #292929;
  --text: #f0f0f0;
  --muted: #929292;
  --input: #181818;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

button, input, select {
  font: inherit;
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: #0a0a0af2;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: calc(14px + env(safe-area-inset-top)) 14px 12px;
}

.header-inner, main {
  width: min(920px, 100%);
  margin: 0 auto;
}

.title-row {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 16px;
  margin-bottom: 12px;
}

h1 {
  margin: 0;
  font-size: 22px;
  line-height: 1.1;
  font-weight: 700;
}

.subtitle, #count {
  color: var(--muted);
  font-size: 13px;
}

.search-wrap {
  position: relative;
}

#search {
  width: 100%;
  height: 45px;
  padding: 0 42px 0 14px;
  color: var(--text);
  background: var(--input);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
}

#search:focus {
  border-color: #5c5c5c;
}

#clear {
  display: none;
  position: absolute;
  right: 7px;
  top: 6px;
  width: 33px;
  height: 33px;
  color: var(--muted);
  background: transparent;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  font-size: 20px;
}

.filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 9px;
}

select {
  width: 100%;
  height: 41px;
  padding: 0 10px;
  color: var(--text);
  background: var(--input);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
}

main {
  padding: 14px 14px 30px;
}

#list {
  display: grid;
  gap: 8px;
}

.card {
  display: grid;
  grid-template-columns: 48px minmax(0, 1fr) 20px;
  align-items: center;
  gap: 12px;
  min-height: 72px;
  padding: 11px 13px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  background: var(--panel-hover);
}

.card:active {
  transform: translateY(1px);
}

.number {
  display: grid;
  place-items: center;
  width: 48px;
  height: 48px;
  color: #d0d0d0;
  background: #1b1b1b;
  border: 1px solid #303030;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
}

.name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 16px;
  font-weight: 700;
}

.meta {
  margin-top: 5px;
  color: var(--muted);
  font-size: 13px;
}

.chevron {
  color: #696969;
  font-size: 24px;
}

#empty {
  display: none;
  padding: 60px 10px;
  color: var(--muted);
  text-align: center;
}

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  overflow: auto;
  background: var(--bg);
}

#viewer.open {
  display: block;
}

.viewer-header {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: calc(10px + env(safe-area-inset-top)) 12px 10px;
  background: #0a0a0af2;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}

.back {
  width: 42px;
  height: 42px;
  color: var(--text);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  font-size: 21px;
}

.viewer-heading {
  min-width: 0;
}

#viewerName {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 700;
}

#viewerNumber {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}

.viewer-body {
  width: min(760px, 100%);
  margin: 0 auto;
  padding: 16px 14px calc(30px + env(safe-area-inset-bottom));
}

.barcode-box {
  display: grid;
  place-items: center;
  min-height: 310px;
  padding: 18px;
  background: white;
  border-radius: 8px;
}

#barcodeImage {
  display: block;
  width: 100%;
  max-width: 680px;
  max-height: 62vh;
  object-fit: contain;
}

.details {
  margin-top: 12px;
  overflow: hidden;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.detail {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
}

.detail:last-child {
  border-bottom: 0;
}

.detail span:first-child {
  color: var(--muted);
}

.detail span:last-child {
  text-align: right;
  font-weight: 700;
  word-break: break-word;
}

.navigation {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}

.navigation button {
  height: 46px;
  color: var(--text);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
}

.navigation button:disabled {
  opacity: .35;
}

@media (min-width: 700px) {
  #list {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1>Card Barcodes</h1>
        <div class="subtitle">Minecraft Dungeons collection</div>
      </div>
      <div id="count"></div>
    </div>

    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search cards" autocomplete="off">
      <button id="clear" aria-label="Clear search">×</button>
    </div>

    <div class="filters">
      <select id="classFilter" aria-label="Filter by class"></select>
      <select id="rarityFilter" aria-label="Filter by rarity"></select>
    </div>
  </div>
</header>

<main>
  <div id="list"></div>
  <div id="empty">No matching cards.</div>
</main>

<section id="viewer">
  <div class="viewer-header">
    <button class="back" id="back" aria-label="Back">←</button>
    <div class="viewer-heading">
      <div id="viewerName"></div>
      <div id="viewerNumber"></div>
    </div>
  </div>

  <div class="viewer-body">
    <div class="barcode-box">
      <img id="barcodeImage" alt="Barcode">
    </div>

    <div class="details">
      <div class="detail"><span>Card number</span><span id="detailNumber"></span></div>
      <div class="detail"><span>Class</span><span id="detailClass"></span></div>
      <div class="detail"><span>Rarity</span><span id="detailRarity"></span></div>
      <div class="detail"><span>Barcode data</span><span id="detailBarcode"></span></div>
    </div>

    <div class="navigation">
      <button id="previous">← Previous</button>
      <button id="next">Next →</button>
    </div>
  </div>
</section>

ge": "144_Chicken_Jockey_e42j0000.svg"}];

const state = {
  query: "",
  className: "All classes",
  rarity: "All rarities",
  filtered: [],
  selected: -1
};

const search = document.getElementById("search");
const clear = document.getElementById("clear");
const classFilter = document.getElementById("classFilter");
const rarityFilter = document.getElementById("rarityFilter");
const list = document.getElementById("list");
const empty = document.getElementById("empty");
const count = document.getElementById("count");
const viewer = document.getElementById("viewer");
const barcodeImage = document.getElementById("barcodeImage");

function fillSelect(select, first, values) {
  select.innerHTML = "";
  [first, ...values].forEach(value => {
    const option = document.createElement("option");
    option.textContent = value;
    option.value = value;
    select.appendChild(option);
  });
}

fillSelect(classFilter, "All classes", [...new Set(cards.map(c => c.class))]);
fillSelect(rarityFilter, "All rarities", [...new Set(cards.map(c => c.rarity))]);

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  })[char]);
}

function render() {
  const q = state.query.trim().toLowerCase();

  state.filtered = cards.filter(card => {
    const searchMatch =
      !q ||
      card.name.toLowerCase().includes(q) ||
      String(card.number).includes(q) ||
      card.barcode.toLowerCase().includes(q);

    const classMatch =
      state.className === "All classes" || card.class === state.className;

    const rarityMatch =
      state.rarity === "All rarities" || card.rarity === state.rarity;

    return searchMatch && classMatch && rarityMatch;
  });

  list.innerHTML = "";

  for (const [index, card] of state.filtered.entries()) {
    const item = document.createElement("div");
    item.className = "card";
    item.innerHTML = `
      <div class="number">${String(card.number).padStart(3, "0")}</div>
      <div>
        <div class="name">${escapeHtml(card.name)}</div>
        <div class="meta">${escapeHtml(card.class)} · ${escapeHtml(card.rarity)}</div>
      </div>
      <div class="chevron">›</div>
    `;
    item.addEventListener("click", () => openCard(index));
    list.appendChild(item);
  }

  count.textContent = `${state.filtered.length} cards`;
  empty.style.display = state.filtered.length ? "none" : "block";
}

function setCard(index) {
  const card = state.filtered[index];
  if (!card) return;

  state.selected = index;

  document.getElementById("viewerName").textContent = card.name;
  document.getElementById("viewerNumber").textContent =
    `Card ${String(card.number).padStart(3, "0")}`;

  document.getElementById("detailNumber").textContent = card.number;
  document.getElementById("detailClass").textContent = card.class;
  document.getElementById("detailRarity").textContent = card.rarity;
  document.getElementById("detailBarcode").textContent = card.barcode;

  // SVGs are normal local image files. encodeURI preserves path separators
  // while safely handling spaces and apostrophes in filenames.
  barcodeImage.src = encodeURI(`barcode_images/${card.image}`);

  document.getElementById("previous").disabled = index === 0;
  document.getElementById("next").disabled =
    index === state.filtered.length - 1;
}

function openCard(index) {
  setCard(index);
  viewer.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeCard() {
  viewer.classList.remove("open");
  document.body.style.overflow = "";
}

search.addEventListener("input", () => {
  state.query = search.value;
  clear.style.display = search.value ? "block" : "none";
  render();
});

clear.addEventListener("click", () => {
  search.value = "";
  state.query = "";
  clear.style.display = "none";
  render();
  search.focus();
});

classFilter.addEventListener("change", () => {
  state.className = classFilter.value;
  render();
});

rarityFilter.addEventListener("change", () => {
  state.rarity = rarityFilter.value;
  render();
});

document.getElementById("back").addEventListener("click", closeCard);
document.getElementById("previous").addEventListener("click", () => {
  if (state.selected > 0) setCard(state.selected - 1);
});
document.getElementById("next").addEventListener("click", () => {
  if (state.selected < state.filtered.length - 1) setCard(state.selected + 1);
});

document.addEventListener("keydown", event => {
  if (!viewer.classList.contains("open")) return;
  if (event.key === "Escape") closeCard();
  if (event.key === "ArrowLeft" && state.selected > 0) setCard(state.selected - 1);
  if (event.key === "ArrowRight" && state.selected < state.filtered.length - 1) {
    setCard(state.selected + 1);
  }
});

render();
</script>
